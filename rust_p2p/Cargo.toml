[package]
name = "liberty_p2p"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# libp2p stack
libp2p = { version = "0.53", features = [
    "tokio",
    "tcp",
    "dns",
    "noise",
    "yamux",
    "mdns",
    "gossipsub",
    "kad",
    "macros",
    "quic",
] }

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptography
ed25519-dalek = "2.0"
sha2 = "0.10"

# FFI for Flutter
flutter_rust_bridge = "1.0"

# Utilities
futures = "0.3"
async-trait = "0.1"
tracing = "0.1"
