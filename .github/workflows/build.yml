name: Hybrid CI/CD Build

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  RUST_VERSION: '1.75'

jobs:
  # ============================================================================
  # Flutter Android Build
  # ============================================================================
  build-flutter:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      # 4. Decode Keystore (BASE64 from secrets)
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "🔐 Decoding keystore from BASE64..."
          mkdir -p mobile/android/app
          echo "$KEYSTORE_BASE64" | base64 --decode > mobile/android/app/upload-keystore.jks
          ls -la mobile/android/app/upload-keystore.jks
      
      # 5. Export Environment Variables
      - name: Setup Environment Variables
        run: |
          echo "📋 Setting up environment variables..."
          echo "STORE_FILE=upload-keystore.jks" >> $GITHUB_ENV
          echo "STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          echo "RPC_URL=${{ secrets.RPC_URL }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "SECRET_LOVE_KEY=${{ secrets.SECRET_LOVE_KEY }}" >> $GITHUB_ENV
      
      # 6. Create key.properties (for Gradle)
      - name: Create key.properties
        run: |
          cat > mobile/android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
          cat mobile/android/key.properties
      
      # 7. Build Flutter APK
      - name: Build Release APK
        working-directory: mobile
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --split-per-abi
      
      # 8. Build App Bundle
      - name: Build App Bundle
        working-directory: mobile
        run: |
          flutter build appbundle --release
      
      # 9. Upload Artifacts
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liberty-reach-apks
          path: |
            mobile/build/app/outputs/flutter-apk/*.apk
            mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 30
      
      # 10. Create Release (if tagged)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            mobile/build/app/outputs/flutter-apk/*.apk
            mobile/build/app/outputs/bundle/release/*.aab
          generate_release_notes: true
          draft: false
  
  # ============================================================================
  # Rust Backend Build
  # ============================================================================
  build-rust:
    name: Build Rust Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          version: ${{ env.RUST_VERSION }}
          override: true
          components: rustfmt, clippy
      
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Setup Environment Variables
        run: |
          echo "RPC_URL=${{ secrets.RPC_URL }}" >> $GITHUB_ENV
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> $GITHUB_ENV
          echo "SECRET_LOVE_KEY=${{ secrets.SECRET_LOVE_KEY }}" >> $GITHUB_ENV
          echo "PINATA_API_KEY=${{ secrets.PINATA_API_KEY }}" >> $GITHUB_ENV
          echo "PINATA_SECRET_KEY=${{ secrets.PINATA_SECRET_KEY }}" >> $GITHUB_ENV
      
      - name: Build Release
        run: cargo build --release
      
      - name: Run Tests
        run: cargo test --release
      
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: liberty-sovereign-backend
          path: target/release/liberty-sovereign
          retention-days: 30
  
  # ============================================================================
  # Docker Build
  # ============================================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-rust]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            zametkikostik/liberty-sovereign:latest
            zametkikostik/liberty-sovereign:${{ github.sha }}
          cache-from: type=registry,ref=zametkikostik/liberty-sovereign:buildcache
          cache-to: type=registry,ref=zametkikostik/liberty-sovereign:buildcache,mode=max
