name: "🔐 Sovereign Manual Build"

on:
  workflow_dispatch:
    inputs:
      master_key:
        description: 'Мастер-пароль для шифрования'
        required: false
        default: 'REDACTED_PASSWORD'
      build_type:
        description: 'Тип сборки'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  KEYSTORE_PASSWORD: 'REDACTED_PASSWORD'
  KEY_PASSWORD: 'REDACTED_PASSWORD'
  KEY_ALIAS: 'liberty'
  MASTER_KEY: ${{ github.event.inputs.master_key || 'REDACTED_PASSWORD' }}

jobs:
  build:
    name: 📱 Build Sovereign APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      # 3. Setup Flutter
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # 4. Get Dependencies
      - name: 📦 Install Dependencies
        run: |
          cd mobile
          flutter pub get

      # 5. Generate Ephemeral Keystore
      - name: 🔐 Generate Ephemeral Keystore (In-Memory)
        run: |
          echo "🔐 Generating keystore in RAM..."
          cd mobile
          mkdir -p android/app
          
          keytool -genkey -v \
            -keystore android/app/release.jks \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Liberty, OU=Sovereign, O=Freedom, L=Sofia, ST=BG, C=BG"
          
          echo "✅ Keystore generated (exists only during build)"
          ls -la android/app/release.jks

      # 6. Create key.properties
      - name: 📝 Create key.properties
        run: |
          cd mobile
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release.jks
          EOF
          echo "✅ key.properties created"

      # 7. Build APK with Master Key & Obfuscation
      - name: 🏗️ Build APK (with --dart-define & Obfuscation)
        run: |
          cd mobile
          echo "🔐 MASTER_KEY: ${{ env.MASTER_KEY }}"
          echo "📦 Building with obfuscation..."
          
          flutter build apk --release \
            --split-per-abi \
            --dart-define=MASTER_KEY=${{ env.MASTER_KEY }} \
            --dart-define=BUILD_TYPE=${{ github.event.inputs.build_type || 'release' }} \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols
          
          echo "✅ APK built successfully"
          ls -la build/app/outputs/flutter-apk/

      # 8. Upload Artifacts
      - name: 📤 Upload Sovereign APK
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Release-APK-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release-armeabi-v7a.apk
            build/app/outputs/flutter-apk/app-release-arm64-v8a.apk
            build/app/outputs/flutter-apk/app-release-x86_64.apk
          retention-days: 30
          if-no-files-found: warn

      # 9. Build Summary
      - name: 📊 Build Summary
        run: |
          echo "## 🔐 Sovereign Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Build Type:** ${{ github.event.inputs.build_type || 'release' }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Master Key:** Set via --dart-define" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Keystore:** Ephemeral (RSA 2048, 10000 days)" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Obfuscation:** Enabled (--obfuscate)" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Signing:** V2/V3 (via key.properties)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
          echo "APKs available in **Artifacts** section (30 days)" >> $GITHUB_STEP_SUMMARY
