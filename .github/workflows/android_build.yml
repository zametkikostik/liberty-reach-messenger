name: Android Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  build-apk:
    name: Build Signed APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # 2. Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
      
      # 4. Decode Keystore
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "Decoding keystore..."
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          ls -la android/app/upload-keystore.jks
      
      # 5. Create key.properties
      - name: Create key.properties
        run: |
          echo "Creating key.properties..."
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF
          cat android/key.properties
      
      # 6. Clean and get dependencies
      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get
      
      # 7. Build APK
      - name: Build Release APK
        run: |
          echo "Building release APK..."
          flutter build apk --release --split-per-abi
      
      # 8. Build App Bundle (optional, for Play Store)
      - name: Build App Bundle
        run: |
          echo "Building App Bundle..."
          flutter build appbundle --release
      
      # 9. Upload APK artifacts
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liberty-reach-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30
      
      # 10. Create GitHub Release (if tagged)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # 11. Output build info
      - name: Build Info
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 APK location: build/app/outputs/flutter-apk/"
          echo "📦 AAB location: build/app/outputs/bundle/release/"
          ls -lh build/app/outputs/flutter-apk/
          ls -lh build/app/outputs/bundle/release/
