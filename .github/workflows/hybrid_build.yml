name: Hybrid CI/CD Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      master_key:
        description: 'Мастер-пароль для шифрования (по умолчанию: REDACTED_PASSWORD)'
        required: false
        default: 'REDACTED_PASSWORD'
      build_type:
        description: 'Тип сборки'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  RUST_VERSION: '1.75'
  # Мастер-пароль из input или по умолчанию
  MASTER_KEY: ${{ github.event.inputs.master_key || 'REDACTED_PASSWORD' }}
  KEYSTORE_PASSWORD: 'REDACTED_PASSWORD'
  KEY_PASSWORD: 'REDACTED_PASSWORD'
  KEY_ALIAS: 'upload'

jobs:
  # ============================================================================
  # Job 1: Build Flutter Android APK
  # ============================================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      # 4. Ensure main.dart exists
      - name: Ensure Flutter Entry Point
        run: |
          echo "🔍 Checking for lib/main.dart..."
          if [ ! -f "lib/main.dart" ]; then
            echo "⚠️ lib/main.dart not found, creating fallback..."
            mkdir -p lib
            cat > lib/main.dart << 'DART_EOF'
          import 'package:flutter/material.dart';
          void main() => runApp(const MaterialApp(home: Scaffold(body: Center(child: Text('Liberty Reach')))));
          DART_EOF
          fi

      # 5. Generate Keystore On-the-Fly
      - name: 🔐 Generate Release Keystore (On-the-Fly)
        run: |
          echo "🔐 Generating release keystore in RAM..."
          mkdir -p android/app
          
          # Генерируем keystore с помощью keytool
          keytool -genkey -v \
            -keystore android/app/upload-keystore.jks \
            -storetype PKCS12 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias "$KEY_ALIAS" \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            -dname "CN=Liberty Reach, OU=Secure Messenger, O=Liberty Project, L=Sofia, ST=Sofia, C=BG"
          
          echo "✅ Keystore generated successfully"
          echo "📋 Keystore location: $(pwd)/android/app/upload-keystore.jks"
          ls -la android/app/upload-keystore.jks
          
          # Проверяем, что keystore валиден
          keytool -list -keystore android/app/upload-keystore.jks -storepass "$KEYSTORE_PASSWORD" || echo "❌ Keystore validation failed"
          
          # Сохраняем хеш для верификации
          echo "📋 Keystore SHA256: $(sha256sum android/app/upload-keystore.jks | cut -d' ' -f1)"

      # 6. Create key.properties
      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          echo "✅ key.properties created"
          cat android/key.properties

      # 8. Build APK
      - name: 📱 Build Release APK (with Master Key & V2/V3 Signing)
        run: |
          echo "🔐 MASTER_KEY is set: ${{ env.MASTER_KEY != '' }}"
          echo "📁 Current directory: $(pwd)"
          echo "📁 Directory structure:"
          ls -R
          
          echo "📋 Checking key.properties..."
          cat android/key.properties || echo "❌ key.properties not found!"
          
          echo "📋 Checking keystore..."
          ls -la android/app/upload-keystore.jks || echo "❌ Keystore not found!"
          
          echo "🔨 Starting Flutter build..."
          flutter clean
          flutter pub get
          
          echo "🚀 Building APK with dart-define..."
          flutter build apk --release \
            --split-per-abi \
            --target lib/main.dart \
            --dart-define=MASTER_KEY=${{ env.MASTER_KEY }} \
            --dart-define=BUILD_TYPE=${{ github.event.inputs.build_type || 'release' }}
          
          echo "✅ APK built successfully"
          echo "📁 APK files:"
          ls -la build/app/outputs/flutter-apk/
        env:
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          MASTER_KEY: ${{ env.MASTER_KEY }}

      # 9. Build App Bundle
      - name: 📦 Build App Bundle (AAB)
        run: |
          flutter build appbundle --release \
            --target lib/main.dart \
            --dart-define=MASTER_KEY=${{ env.MASTER_KEY }} \
            --dart-define=BUILD_TYPE=${{ github.event.inputs.build_type || 'release' }}
          
          echo "✅ AAB built successfully"
          ls -la build/app/outputs/bundle/release/
        env:
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ env.KEYSTORE_PASSWORD }}
          MASTER_KEY: ${{ env.MASTER_KEY }}

      # 10. Upload Artifacts
      - name: 📤 Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: liberty-reach-apks-${{ github.run_number }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release-armeabi-v7a.apk
            build/app/outputs/flutter-apk/app-release-arm64-v8a.apk
            build/app/outputs/flutter-apk/app-release-x86_64.apk
            build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
          if-no-files-found: warn

      # 11. Upload Summary
      - name: 📊 Build Summary
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Build Type:** ${{ github.event.inputs.build_type || 'release' }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Master Key:** Set via --dart-define" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Keystore:** Generated on-the-fly (RSA 2048, 10000 days)" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Signing:** V2/V3 enabled via key.properties" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download Links" >> $GITHUB_STEP_SUMMARY
          echo "- APKs will be available in **Artifacts** section" >> $GITHUB_STEP_SUMMARY
          echo "- Click on the workflow run → **Artifacts** → Download" >> $GITHUB_STEP_SUMMARY

      # 11. Create Release (if tagged)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          generate_release_notes: true
          draft: false

  # ============================================================================
  # Job 2: Deploy Cloudflare Worker (Rust Backend)
  # ============================================================================
  deploy-backend:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Rust
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          target: wasm32-unknown-unknown

      # 3. Cache Cargo
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('backend/Cargo.lock') }}

      # 4. Install worker-build
      - name: Install worker-build
        run: cargo install worker-build

      # 5. Build Worker
      - name: Build Worker
        run: worker-build --release

      # 6. Deploy to Cloudflare
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'backend'
          command: deploy

      # 7. Output deployment info
      - name: Deployment Info
        run: |
          echo "✅ Backend deployed successfully!"
          echo "🌐 Worker URL: https://a-love-story.${{ vars.CLOUDFLARE_ACCOUNT_SUBDOMAIN }}.workers.dev"

  # ============================================================================
  # Job 3: Build & Push Docker Image (Optional)
  # ============================================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-android]
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ secrets.DOCKER_PASSWORD != '' }}
          tags: |
            zametkikostik/liberty-sovereign:latest
            zametkikostik/liberty-sovereign:${{ github.sha }}
          cache-from: type=registry,ref=zametkikostik/liberty-sovereign:buildcache
          cache-to: type=registry,ref=zametkikostik/liberty-sovereign:buildcache,mode=max
