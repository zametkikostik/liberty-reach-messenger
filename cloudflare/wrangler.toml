# ============================================================================
# LIBERTY REACH - Cloudflare Worker Configuration
# ============================================================================
# Deploy: npx wrangler deploy
# URL: liberty-reach-messenger.zametkikostik.workers.dev
# ============================================================================

name = "liberty-reach-messenger"
main = "worker.js"
compatibility_date = "2024-01-01"

# ============================================================================
# ENVIRONMENT VARIABLES
# ============================================================================
[vars]
# Repository URLs
GITHUB_URL = "https://github.com/zametkikostik/liberty-reach-messenger"
CODEBERG_URL = "https://codeberg.org/zametkikostik/liberty-reach-messenger"

# API Configuration
API_TIMEOUT = "10000"
CACHE_TTL = "3600"

# ============================================================================
# ROUTES (Optional - for custom domains)
# ============================================================================
# [[routes]]
# pattern = "liberty-reach.example.com/*"
# zone_name = "example.com"

# ============================================================================
# KV NAMESPACES (Optional - for caching)
# ============================================================================
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# ============================================================================
# DEPLOYMENT
# ============================================================================
# Production:
#   npx wrangler deploy
#
# Development:
#   npx wrangler dev
#
# Tail logs:
#   npx wrangler tail
# ============================================================================
