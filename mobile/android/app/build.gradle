plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.zametkikostik.liberty_reach"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.zametkikostik.liberty_reach"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "0.4.0"
    }

    // ========================================================================
    // SIGNING CONFIGURATION
    // Uses environment variables from GitHub Secrets
    // Compatible with Flutter 3.24+ and Gradle 8.x
    // ========================================================================
    signingConfigs {
        release {
            // Use environment variables (set by GitHub Actions)
            keyAlias System.getenv("KEY_ALIAS") ?: "upload"
            keyPassword System.getenv("KEY_PASSWORD")
            storePassword System.getenv("KEYSTORE_PASSWORD")
            
            // Determine store file path - works in CI and locally
            def keystorePath = System.getenv("GITHUB_WORKSPACE") 
                ? "${System.getenv("GITHUB_WORKSPACE")}/mobile/android/app/upload-keystore.jks"
                : "upload-keystore.jks"
            
            storeFile file(keystorePath)
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
