plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.zametkikostik.liberty_reach"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.zametkikostik.liberty_reach"
        minSdk 26  // Required for flutter_webrtc and Tor
        targetSdk 34
        versionCode 1
        versionName "0.6.0"
        
        // MultiDex for Tor and WebRTC dependencies
        multiDexEnabled true
    }

    // ========================================================================
    // SIGNING CONFIGURATION - RELATIVE PATHS ONLY
    // Keystore must be at: android/app/upload-keystore.jks
    // keyAlias = 'upload' (verified with Sofia)
    // ========================================================================
    signingConfigs {
        release {
            keyAlias "upload"
            keyPassword System.getenv("KEY_PASSWORD")
            storePassword System.getenv("KEYSTORE_PASSWORD")
            storeFile file("upload-keystore.jks")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // 🧅 Tor integration for Android
    implementation 'org.torproject:tor-android-binary:0.4.7.10'
    
    // MultiDex support
    implementation 'androidx.multidex:multidex:2.0.1'
    
    // WebRTC dependencies (included via flutter_webrtc)
    // implementation 'org.webrtc:google-webrtc:1.0.32006'
}
