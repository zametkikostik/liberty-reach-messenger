plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.zametkikostik.liberty_reach"
    compileSdk 35
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.zametkikostik.liberty_reach"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.8.0"
        multiDexEnabled true
    }

    signingConfigs {
        release {
            keyAlias "upload"
            keyPassword project.hasProperty("KEY_PASSWORD") ? project.property("KEY_PASSWORD") : ""
            storePassword project.hasProperty("STORE_PASSWORD") ? project.property("STORE_PASSWORD") : ""
            storeFile file("upload-keystore.jks")
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // 🧅 Tor Android (Guardian Project - Latest Stable)
    implementation 'info.guardianproject:tor-android:0.4.9.5'
    implementation 'info.guardianproject:jtorctl:0.4.5.7'

    // MultiDex support
    implementation 'androidx.multidex:multidex:2.0.1'
}
