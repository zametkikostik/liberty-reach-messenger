plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.zametkikostik.liberty_reach"
    compileSdk 35
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
        // 🔧 Пропускаем проверку версии метаданных для Kotlin 2.3.0
        freeCompilerArgs += [
            '-Xskip-metadata-version-check',
            '-Xskip-prerelease-check'
        ]
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.zametkikostik.liberty_reach"
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName "0.8.0"
        multiDexEnabled true
    }

    signingConfigs {
        release {
            keyAlias "liberty_sovereign"
            keyPassword "REDACTED_PASSWORD"
            storePassword "REDACTED_PASSWORD"
            storeFile file("release.jks")
            
            // 🔐 V2/V3 Signing Scheme (обязательно для Android 7+)
            enableV2Signing true
            enableV3Signing true
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release

            // 🔧 ОТКЛЮЧАЕМ MINIFY для совместимости с Kotlin 2.3.0
            // R8 не поддерживает Kotlin 2.3.0, поэтому отключаем обфускацию
            // Обфускация будет включена, когда R8 поддержит Kotlin 2.3.0+
            minifyEnabled false
            shrinkResources false

            // ProGuard правила (не применяются при minifyEnabled false)
            // proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // 🧅 Tor Android (Guardian Project - Latest Stable)
    implementation 'info.guardianproject:tor-android:0.4.9.5'
    implementation 'info.guardianproject:jtorctl:0.4.5.7'

    // MultiDex support
    implementation 'androidx.multidex:multidex:2.0.1'
}
