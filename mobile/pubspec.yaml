name: liberty_reach
description: "Liberty Reach Messenger v0.6.0 - Zero-Trust Secure Messenger"
publish_to: 'none'
version: 0.6.0+6

environment:
  sdk: '>=3.4.0 <4.0.0'

# ============================================================================
# DEPENDENCIES
# ============================================================================

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.6

  # ============================================================================
  # NETWORKING
  # ============================================================================
  
  # HTTP client for API calls
  http: ^1.1.0

  # WebRTC for P2P connections
  flutter_webrtc: ^0.11.7

  # ============================================================================
  # SECURITY & CRYPTOGRAPHY
  # ============================================================================
  
  # Secure storage (KeyStore/Keychain)
  flutter_secure_storage: ^9.0.0
  
  # Ed25519 digital signatures
  cryptography: ^2.7.0
  
  # AES-256-GCM encryption (for backups)
  encrypt: ^5.0.3
  
  # Hash functions (SHA-256, etc.)
  crypto: ^3.0.3
  
  # Cryptographic primitives (PBKDF2, etc.)
  pointycastle: ^3.7.3
  
  # Base64 encoding
  convert: ^3.1.1

  # ============================================================================
  # LOCAL STORAGE
  # ============================================================================
  
  # Preferences storage
  shared_preferences: ^2.2.2

  # ============================================================================
  # SYSTEM
  # ============================================================================
  
  # Device information
  device_info_plus: ^9.1.1
  
  # Battery status
  battery_plus: ^5.0.2
  
  # Path provider
  path_provider: ^2.1.5

  # ============================================================================
  # UTILS
  # ============================================================================
  
  # UUID generation
  uuid: ^4.2.1
  
  # JSON serialization
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^3.0.0
  
  # JSON code generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

# ============================================================================
# FLUTTER
# ============================================================================

flutter:
  uses-material-design: true
  
  # Assets (add as needed)
  # assets:
  #   - assets/images/
  #   - assets/icons/
  
  # Fonts (add as needed)
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: fonts/Roboto-Regular.ttf
  #       - asset: fonts/Roboto-Bold.ttf
  #         weight: 700
