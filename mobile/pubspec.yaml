name: liberty_reach
description: "Liberty Reach Messenger v0.6.0 - Zero-Trust Secure Messenger"
publish_to: 'none'
version: 0.6.0+6

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Networking
  http: ^1.1.0
  dio: ^5.4.0
  # flutter_webrtc: ^0.11.7  # TODO: Fix build - SimulcastVideoEncoderFactoryWrapper error

  # Security & Cryptography
  flutter_secure_storage: ^9.0.0
  cryptography: ^2.7.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  pointycastle: ^3.7.3
  convert: ^3.1.1

  # Biometric authentication
  local_auth: ^2.1.6

  # Local storage
  shared_preferences: ^2.2.2

  # System
  device_info_plus: ^9.1.1
  battery_plus: ^5.0.2
  path_provider: ^2.1.5

  # Utils
  uuid: ^4.2.1
  flutter_dotenv: ^5.1.0
  web_socket_channel: ^2.4.0
  
  # Speech-to-Text
  speech_to_text: ^6.6.0
  permission_handler: ^11.3.0

  # Audio
  # record: ^5.0.4  # Build issues, use native implementation
  audioplayers: ^5.2.1
  
  # WebRTC (Video calls)
  flutter_webrtc: ^0.9.38  # Stable version without build issues

  # GIF Picker (using http instead)
  # giphy_dart: ^2.0.0  # Not available, using direct API

  # Push Notifications (optional - for production)
  # firebase_messaging: ^14.7.0  # TODO: Add for production
  # firebase_core: ^2.24.0

  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^5.0.1
  cached_network_image: ^3.3.0
  # emoji_picker_flutter: ^1.6.2  # Build issues, using custom picker instead

  # Google Fonts
  google_fonts: ^6.3.0

  # State Management
  provider: ^6.1.1

  # Particles/Effects
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
